name: CI

on:
  push:
    branches: [main, "design-sync/**", "etapp/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Byggtidsplaceholder — next.config.ts och lib/api/client.ts kastar utan
      # den. Inga anrop görs under bygget; riktiga värden sätts i Vercel.
      NEXT_PUBLIC_API_URL: https://api.example.invalid/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
